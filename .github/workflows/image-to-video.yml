name: Image to Video
on:
  repository_dispatch:
    types: [render_video]

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        run: |
          mkdir -p videos
          curl -L "${{ github.event.client_payload.image_url }}" -o input.png

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Pick track and convert to vertical video with audio
        run: |
          ROW_ID="${{ github.event.client_payload.row_id }}"
          TRACK_NUM=$(( (ROW_ID % 5) + 1 ))
          TRACK="track${TRACK_NUM}.mp3.mp3"
          echo "Using $TRACK"
          ffmpeg -y -loop 1 -i input.png -stream_loop -1 -i "$TRACK" -t 30 \
          -vf "scale=972:972,pad=1080:1920:54:474:color=0xF3ECDE" \
          -c:v libx264 -pix_fmt yuv420p -r 30 \
          -c:a aac -b:a 128k -shortest \
          videos/row-${{ github.event.client_payload.row_id }}.mp4

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/row-${{ github.event.client_payload.row_id }}.mp4
          git commit -m "Reel video for row ${{ github.event.client_payload.row_id }}"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push failed, retrying ($i)..."
            sleep 5
          done
