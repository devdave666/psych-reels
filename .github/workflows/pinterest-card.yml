name: Pinterest Card
on:
  repository_dispatch:
    types: [render_pinterest_card]

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wkhtmltoimage
        run: sudo apt-get update && sudo apt-get install -y wkhtmltopdf

      - name: Build card HTML
        run: |
          python3 render_pinterest.py "${{ github.event.client_payload.quote_text }}" "${{ github.event.client_payload.attribution }}" "${{ github.event.client_payload.source }}" "${{ github.event.client_payload.row_id }}"

      - name: Render image
        run: |
          mkdir -p pins
          wkhtmltoimage --width 1000 --height 1500 card.html pins/row-${{ github.event.client_payload.row_id }}.png

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pins/row-${{ github.event.client_payload.row_id }}.png
          git commit -m "Pinterest card for row ${{ github.event.client_payload.row_id }}"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push failed, retrying ($i)..."
            sleep 5
          done
